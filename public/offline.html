<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión · PescaPlus</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #f2efe6; color: #111; font-family: system-ui, -apple-system, sans-serif; padding: 24px; text-align: center;
      }
      .card { max-width: 420px; }
      .kicker { letter-spacing: 3px; text-transform: uppercase; color: #0f766e; font-weight: 700; font-size: 12px; margin: 0 0 12px; }
      h1 { font-size: 40px; line-height: 1.05; margin: 0 0 12px; text-transform: uppercase; font-weight: 800; }
      p { color: #555; font-size: 15px; margin: 0 0 24px; }
      button {
        background: #111; color: #f2efe6; border: none; padding: 12px 24px; font-weight: 700;
        text-transform: uppercase; font-size: 14px; cursor: pointer; border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="kicker">🎣 PescaPlus</p>
      <h1>Sin conexión</h1>
      <p>No hay conexión a internet ahora mismo. Comprueba tu red y vuelve a intentarlo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
